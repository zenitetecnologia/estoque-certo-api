          text: |-
            {
            	"matrizId": null,
              "cnpj": "60935686000134",
              "razaoSocial": "Zênite Tecnologia LTDA.",
              "nomeFantasia": "Zênite Tecnologia",
              "cep": null,
            	"endereco": null,
              "numero": null,
              "complemento": null,
              "bairro": null,
              "cidade": null,
              "uf": null,
              "pais": null,
              "email": null
            }
        headers:
          - name: Content-Type
            value: application/json
        scripts:
          afterResponse: >-
            insomnia.test('Salvar unidade_organizacional_id do Location', () =>
            {
              insomnia.expect(insomnia.response.code).to.eql(201);

              const locationHeader = insomnia.response.headers.find(
                h => h.key && h.key.toLowerCase() === 'location'
              );

              if (!locationHeader) {
                throw new Error('Header Location não encontrado.');
              }

              const uo = locationHeader.value.split('/').pop();
              insomnia.environment.set('unidade_organizacional_id_oficial', uo);
            });
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
